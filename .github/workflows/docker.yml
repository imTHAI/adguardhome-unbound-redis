name: Build and Push Multi-Arch Docker Image

on:
  # 1. Manual trigger always available
  workflow_dispatch: 
    inputs:
      tag:
        description: 'Tag/Version to build (e.g., v0.107.74)'
        required: false
        default: ''

  # 2. Automatic check every 6 hours
  schedule:
    - cron: '0 */6 * * *'

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 120 # QEMU (ARM64) is slow, providing extra time to avoid timeouts
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- STEP A: Version detection ---
      - name: Get latest AdGuardHome release
        id: get_version
        run: |
          if [ "${{ github.event.inputs.tag }}" != "" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
            echo "Using manual tag: ${{ github.event.inputs.tag }}"
          else
            # Use GITHUB_TOKEN to avoid rate limiting on the GitHub API
            LATEST_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r .tag_name)
            echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "Latest upstream tag is: $LATEST_TAG"
          fi

      # --- STEP B: State verification (Check if image already exists) ---
      - name: Check if image already exists on Docker Hub
        id: check_image
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/adguardhome-unbound-redis"

          # Get anonymous pull token from Docker Hub auth service
          TOKEN=$(curl -s \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${REPO}:pull" \
            | jq -r '.token')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://registry-1.docker.io/v2/${REPO}/manifests/${TAG}")

          echo "Registry API status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Image ${TAG} already exists. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          elif [ "$HTTP_STATUS" -eq 404 ]; then
            echo "Image ${TAG} not found. Starting build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "Unexpected status $HTTP_STATUS — skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      # --- STEP C: Environment preparation (Only if build is required) ---
      - name: Set up QEMU (for ARM64 emulation)
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to dhi.io (Hardened Images)
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to Docker Hub
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to GitHub Container Registry
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # --- STEP D: Multi-Arch Build and Push ---
      - name: Build and push multi-arch image
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGH_VERSION=${{ steps.get_version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/adguardhome-unbound-redis:${{ steps.get_version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/adguardhome-unbound-redis:${{ steps.get_version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/adguardhome-unbound-redis:latest
            ghcr.io/${{ github.repository_owner }}/adguardhome-unbound-redis:latest
